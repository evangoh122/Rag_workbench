name: Deploy → Seed → RAG Pipeline Validation

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/20 * * * *'   # keepalive ping
    - cron: '0 3 * * *'      # nightly full data refresh
  workflow_dispatch: {}

# ── 1. Sync secrets ─────────────────────────────────────────────────────────
jobs:
  sync-secrets:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Sync API keys to HuggingFace Space secrets
        env:
          HF_TOKEN:       ${{ secrets.HF_TOKEN }}
          HF_USERNAME:    ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME:  ${{ secrets.HF_SPACE_NAME }}
        run: |
          upload_secret() {
            local key=$1 value=$2
            if [ -n "$value" ]; then
              echo "Uploading secret: $key"
              curl -sf -X POST \
                "https://huggingface.co/api/spaces/$HF_USERNAME/$HF_SPACE_NAME/secrets" \
                -H "Authorization: Bearer $HF_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"key\": \"$key\", \"value\": \"$value\"}" \
                -o /dev/null -w "  -> HTTP %{http_code}\n" || echo "  -> FAILED"
            else
              echo "Skipping $key (not set)"
            fi
          }
          upload_secret "GEMINI_API_KEY"    "${{ secrets.GEMINI_API_KEY }}"
          upload_secret "GOOGLE_API_KEY"    "${{ secrets.GOOGLE_API_KEY }}"
          upload_secret "DEEPSEEK_API_KEY"  "${{ secrets.DEEPSEEK_API_KEY }}"
          upload_secret "XIAOMI_API_KEY"    "${{ secrets.XIAOMI_API_KEY }}"
          upload_secret "OPENAI_API_KEY"    "${{ secrets.OPENAI_API_KEY }}"
          upload_secret "ANTHROPIC_API_KEY" "${{ secrets.ANTHROPIC_API_KEY }}"
          upload_secret "REVIEW_API_KEY"    "${{ secrets.REVIEW_API_KEY }}"
          upload_secret "LANGSMITH_API_KEY" "${{ secrets.LANGSMITH_API_KEY }}"
          upload_secret "ADMIN_API_KEY"     "${{ secrets.ADMIN_API_KEY }}"
          upload_secret "EDGAR_USER_AGENT"  "${{ secrets.EDGAR_USER_AGENT }}"
          upload_secret "EMBEDDING_PROVIDER" "huggingface"
          upload_secret "HF_EMBEDDING_MODEL" "Qwen/Qwen3-Embedding-8B"
          upload_secret "HF_EMBED_PROVIDER"  "scaleway"

# ── 2. Deploy to HF Space ────────────────────────────────────────────────────
  deploy:
    needs: sync-secrets
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      space_url: ${{ steps.url.outputs.url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Build Space URL
        id: url
        env:
          HF_USERNAME:   ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          SLUG=$(echo "$HF_SPACE_NAME" | tr '[:upper:]' '[:lower:]')
          echo "url=https://${HF_USERNAME}-${SLUG}.hf.space" >> "$GITHUB_OUTPUT"

      - name: Push to HF Space
        env:
          HF_TOKEN:      ${{ secrets.HF_TOKEN }}
          HF_USERNAME:   ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          git remote add hf https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME
          git push hf main --force

# ── 3. Wait for Space to accept traffic ─────────────────────────────────────
  await-space:
    needs: deploy
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      space_url: ${{ needs.deploy.outputs.space_url }}
    steps:
      - name: Poll health until 200 (5-minute budget)
        env:
          SPACE_URL: ${{ needs.deploy.outputs.space_url }}
        run: |
          echo "Waiting for $SPACE_URL to come online..."
          for i in $(seq 1 20); do
            STATUS=$(curl -sf --max-time 20 "$SPACE_URL/api/health" \
              -o /dev/null -w "%{http_code}" || echo "000")
            echo "Attempt $i/20 — HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "Space is live." && exit 0
            sleep 15
          done
          echo "ERROR: Space did not respond within 5 minutes." && exit 1

# ── 4. Seed XBRL data from SEC EDGAR ────────────────────────────────────────
  seed-data:
    needs: await-space
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger incremental XBRL refresh (skips existing tickers)
        env:
          SPACE_URL:     ${{ needs.await-space.outputs.space_url }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: |
          echo "Seeding XBRL facts from SEC EDGAR..."
          RESPONSE=$(curl -sf --max-time 600 -X POST \
            "$SPACE_URL/api/admin/refresh-data" \
            -H "X-API-Key: $ADMIN_API_KEY" \
            -H "Content-Type: application/json")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('status') in ('ok', 'partial'), f'Seed failed: {d}'
          processed = d.get('tickers_processed', 0)
          facts     = d.get('facts_loaded', 0)
          skipped   = d.get('skipped_tickers', [])
          if processed == 0 and not skipped:
              print('All tickers already seeded — nothing to fetch.')
          else:
              print(f'Seeded: {processed} tickers, {facts} facts loaded.')
          if skipped:
              print(f'WARNING — skipped {len(skipped)} ticker(s): {skipped}')
          "

# ── 5. RAG pipeline smoke test — full coverage list (31 tickers) ─────────────
#  Pipeline under test: chunk → BM25+vector hybrid retrieval → rerank → RRF
#  Runs sequentially to avoid hammering the HF Space; collects all failures
#  before exiting so you see the full pass/fail table in one run.
  rag-pipeline:
    needs: [await-space, seed-data]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: "RAG pipeline — all 31 tickers (chunk → hybrid BM25+vector → rerank → RRF)"
        env:
          SPACE_URL: ${{ needs.await-space.outputs.space_url }}
        run: |
          python3 - <<'PYEOF'
import json, os, sys, time
from urllib import request, error

SPACE_URL = os.environ["SPACE_URL"]
ENDPOINT  = f"{SPACE_URL}/api/chat/auditable-rag"

# Full semiconductor coverage list (mirrors TICKER_TO_CIK in admin.py)
TICKERS = [
    "ADI",  "AMD",  "AVGO", "INTC", "MU",   "NVDA", "QCOM", "TXN",
    "TSM",  "MRVL", "NXPI", "MCHP", "MPWR", "SWKS", "QRVO", "ON",
    "AMAT", "LRCX", "KLAC", "TER",  "ENTG", "ONTO", "FORM", "PLAB",
    "COHU", "KLIC", "ICHR", "VECO", "AEHR", "ACLS", "AMKR",
]

# One meaningful financial query per ticker
QUERIES = {
    "ADI":  "What was Analog Devices' revenue and gross margin in their most recent 10-K?",
    "AMD":  "What were AMD's net income and R&D expenses?",
    "AVGO": "What is Broadcom's revenue and operating margin?",
    "INTC": "What is Intel's free cash flow and capital expenditure?",
    "MU":   "What is Micron's gross margin and long-term debt?",
    "NVDA": "What was NVIDIA's total revenue and gross profit?",
    "QCOM": "What are Qualcomm's revenues and earnings per share?",
    "TXN":  "What is Texas Instruments' operating income and cash flow?",
    "TSM":  "What is TSMC's revenue growth and net income?",
    "MRVL": "What were Marvell's revenues and operating expenses?",
    "NXPI": "What is NXP Semiconductors' gross margin and debt?",
    "MCHP": "What are Microchip Technology's revenues and R&D spend?",
    "MPWR": "What is Monolithic Power's revenue and net income?",
    "SWKS": "What were Skyworks' revenues and operating income?",
    "QRVO": "What is Qorvo's gross margin and free cash flow?",
    "ON":   "What are onsemi's revenues and capital expenditures?",
    "AMAT": "What is Applied Materials' revenue and operating margin?",
    "LRCX": "What were Lam Research's revenues and gross profit?",
    "KLAC": "What is KLA Corporation's net income and R&D expense?",
    "TER":  "What are Teradyne's revenues and operating income?",
    "ENTG": "What is Entegris' revenue and long-term debt?",
    "ONTO": "What were Onto Innovation's revenues and net income?",
    "FORM": "What is FormFactor's revenue and gross margin?",
    "PLAB": "What are Photronics' revenues and net income?",
    "COHU": "What is Cohu's revenue and operating income?",
    "KLIC": "What are Kulicke & Soffa's revenues and earnings?",
    "ICHR": "What is Ichor Holdings' revenue and gross margin?",
    "VECO": "What were Veeco's revenues and R&D expenses?",
    "AEHR": "What is Aehr Test Systems' revenue and net income?",
    "ACLS": "What are Axcelis Technologies' revenues and operating income?",
    "AMKR": "What is Amkor Technology's revenue and gross profit?",
}

passed, failed = [], []

for ticker in TICKERS:
    query = QUERIES[ticker]
    payload = json.dumps({"message": query, "ticker": ticker}).encode()
    req = request.Request(
        ENDPOINT,
        data=payload,
        headers={"Content-Type": "application/json"},
        method="POST",
    )
    try:
        with request.urlopen(req, timeout=120) as resp:
            d = json.loads(resp.read())
    except error.HTTPError as e:
        body = e.read().decode()[:200]
        failed.append((ticker, f"HTTP {e.code}: {body}"))
        print(f"FAIL [{ticker}] HTTP {e.code}")
        time.sleep(2)
        continue
    except Exception as e:
        failed.append((ticker, str(e)))
        print(f"FAIL [{ticker}] {e}")
        time.sleep(2)
        continue

    answer     = d.get("answer") or d.get("result") or ""
    eval_route = d.get("eval_route", "UNKNOWN")
    confidence = d.get("confidence")
    sources    = d.get("sources", [])

    if not answer or len(answer) < 20:
        reason = f"answer too short ({len(answer)} chars): {answer!r}"
        failed.append((ticker, reason))
        print(f"FAIL [{ticker}] {reason}")
    else:
        passed.append(ticker)
        conf_str = f"{confidence:.2%}" if confidence is not None else "n/a"
        print(f"PASS [{ticker}]  route={eval_route}  conf={conf_str}  sources={len(sources)}  '{answer[:80]}...'")

    time.sleep(1)   # gentle rate limit between requests

# ── Summary ──────────────────────────────────────────────────────────────────
print()
print(f"{'='*60}")
print(f"RAG pipeline results: {len(passed)}/{len(TICKERS)} passed")
print(f"{'='*60}")
if failed:
    print(f"\nFAILED ({len(failed)}):")
    for t, reason in failed:
        print(f"  {t}: {reason}")
    sys.exit(1)
else:
    print("All tickers passed — chunk → hybrid BM25+vector → rerank → RRF OK")
PYEOF

# ── Keepalive (every 20 min) ─────────────────────────────────────────────────
  keepalive:
    if: github.event.schedule == '*/20 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          HF_USERNAME:   ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          SLUG=$(echo "$HF_SPACE_NAME" | tr '[:upper:]' '[:lower:]')
          STATUS=$(curl -sf --max-time 30 \
            "https://$HF_USERNAME-$SLUG.hf.space/api/health" \
            -o /dev/null -w "%{http_code}" || echo "000")
          echo "Health: HTTP $STATUS"
          [ "$STATUS" = "200" ] && echo "Space alive" || echo "Space cold/waking"

# ── Nightly data refresh (3 AM UTC) ─────────────────────────────────────────
  nightly-refresh:
    if: github.event.schedule == '0 3 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Incremental XBRL refresh
        env:
          HF_USERNAME:   ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: |
          SLUG=$(echo "$HF_SPACE_NAME" | tr '[:upper:]' '[:lower:]')
          BASE="https://$HF_USERNAME-$SLUG.hf.space"
          echo "Waking space..."
          for i in $(seq 1 10); do
            STATUS=$(curl -sf --max-time 30 "$BASE/api/health" \
              -o /dev/null -w "%{http_code}" || echo "000")
            [ "$STATUS" = "200" ] && echo "Awake." && break
            echo "Attempt $i: $STATUS — retrying in 15s..."
            sleep 15
          done
          RESPONSE=$(curl -sf --max-time 600 -X POST \
            "$BASE/api/admin/refresh-data" \
            -H "X-API-Key: $ADMIN_API_KEY" \
            -H "Content-Type: application/json")
          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['status'] in ('ok', 'partial'), f'Refresh failed: {d}'
          skipped = d.get('skipped_tickers', [])
          print(f'Refresh: {d[\"tickers_processed\"]} tickers, {d[\"facts_loaded\"]} facts')
          if skipped: print(f'Skipped: {skipped}')
          "
