name: Deploy → Verify → RAG Pipeline Validation

# The Space restores the prebuilt Qwen DuckDB from the HF dataset at boot
# (fetch_db_from_dataset.py), so routine pushes do NOT re-seed/re-embed from
# SEC EDGAR. The dataset is the single source of truth. EDGAR seeding is a
# manual escape hatch (workflow_dispatch) for rebuilding the corpus.
# Keep-warm pings live in keep-awake.yml (daily 00:00 UTC).

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force-seed:
        description: 'Force re-seed all 31 tickers from SEC EDGAR'
        required: false
        type: boolean
        default: false
      embed:
        description: 'Run chunking + embedding of 10-K filings'
        required: false
        type: boolean
        default: false

# ── 1. Sync secrets ─────────────────────────────────────────────────────────
jobs:
  sync-secrets:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Sync API keys to HuggingFace Space secrets
        env:
          HF_TOKEN:       ${{ secrets.HF_TOKEN }}
          HF_USERNAME:    ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME:  ${{ secrets.HF_SPACE_NAME }}
        run: |
          # POST with retry/backoff — HF's API rate-limits (HTTP 429) when many
          # keys are pushed in quick succession (several deploys in a row).
          # Retry 429/5xx/transport errors with linear backoff so a transient
          # throttle doesn't fail the whole deploy.
          post_with_retry() {
            local url=$1 json_body=$2 code
            for attempt in 1 2 3 4 5; do
              code=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "$url" \
                -H "Authorization: Bearer $HF_TOKEN" \
                -H "Content-Type: application/json" \
                -d "$json_body") || code="000"
              if [ "$code" -ge 200 ] 2>/dev/null && [ "$code" -lt 300 ] 2>/dev/null; then
                echo "  -> HTTP $code"; return 0
              fi
              echo "  -> HTTP $code (attempt $attempt/5)"
              case "$code" in
                429|5*|000) sleep $((attempt * 10)) ;;
                *) echo "  -> non-retryable"; return 1 ;;
              esac
            done
            echo "  -> FAILED after retries"; return 1
          }
          upload_secret() {
            local key=$1 value=$2
            if [ -n "$value" ]; then
              echo "Uploading secret: $key"
              post_with_retry \
                "https://huggingface.co/api/spaces/$HF_USERNAME/$HF_SPACE_NAME/secrets" \
                "$(jq -nc --arg k "$key" --arg v "$value" '{"key": $k, "value": $v}')"
            else
              echo "Skipping $key (not set)"
            fi
          }
          # Space VARIABLES (not secrets) are passed to the Docker build as
          # --build-arg, which is required for Vite to inline VITE_* vars into
          # the frontend bundle. The PostHog project key is client-public, so a
          # variable (not a secret) is the correct classification.
          upload_variable() {
            local key=$1 value=$2
            if [ -n "$value" ]; then
              echo "Uploading variable: $key"
              post_with_retry \
                "https://huggingface.co/api/spaces/$HF_USERNAME/$HF_SPACE_NAME/variables" \
                "$(jq -nc --arg k "$key" --arg v "$value" '{"key": $k, "value": $v}')"
            else
              echo "Skipping $key (not set)"
            fi
          }
          upload_secret "GEMINI_API_KEY"    "${{ secrets.GEMINI_API_KEY }}"
          upload_secret "GOOGLE_API_KEY"    "${{ secrets.GOOGLE_API_KEY }}"
          upload_secret "DEEPSEEK_API_KEY"  "${{ secrets.DEEPSEEK_API_KEY }}"
          upload_secret "XIAOMI_API_KEY"    "${{ secrets.XIAOMI_API_KEY }}"
          upload_secret "OPENAI_API_KEY"    "${{ secrets.OPENAI_API_KEY }}"
          upload_secret "ANTHROPIC_API_KEY" "${{ secrets.ANTHROPIC_API_KEY }}"
          upload_secret "REVIEW_API_KEY"    "${{ secrets.REVIEW_API_KEY }}"
          upload_secret "LANGSMITH_API_KEY" "${{ secrets.LANGSMITH_API_KEY }}"
          upload_secret "ADMIN_API_KEY"     "${{ secrets.ADMIN_API_KEY }}"
          upload_secret "EDGAR_USER_AGENT"  "${{ secrets.EDGAR_USER_AGENT }}"
          # Local in-process embeddings (sentence-transformers) — no HF Inference
          # API call, so no scaleway-routing 403s and no 8B-model OOM on the Space.
          upload_secret "EMBEDDING_PROVIDER" "sentence-transformers"
          upload_secret "ST_EMBEDDING_MODEL" "Qwen/Qwen3-Embedding-0.6B"
          upload_secret "EMBEDDING_DIM"      "1024"
          # Qwen3-Embedding uses an instruction prefix on the QUERY side only
          # (documents are embedded as-is). Applied via EMBEDDING_QUERY_PREFIX.
          # printf renders the \n as a real newline (Qwen's "Instruct: …\nQuery: …"
          # format); jq then JSON-encodes that newline so the Space env var is correct.
          upload_secret "EMBEDDING_QUERY_PREFIX" "$(printf 'Instruct: Given a financial question, retrieve relevant SEC filing passages that answer it.\nQuery: ')"
          # PostHog product analytics — build-time variables for the frontend.
          # Set the GitHub secret VITE_POSTHOG_KEY to activate; leaving it unset
          # keeps analytics disabled (the app no-ops when the key is empty).
          upload_variable "VITE_POSTHOG_KEY"  "${{ secrets.VITE_POSTHOG_KEY }}"
          upload_variable "VITE_POSTHOG_HOST" "${{ secrets.VITE_POSTHOG_HOST }}"

          # PostHog backend secrets for querying aggregates (charts)
          upload_secret "POSTHOG_API_KEY"    "${{ secrets.POSTHOG_API_KEY }}"
          upload_secret "POSTHOG_PROJECT_ID" "${{ secrets.POSTHOG_PROJECT_ID }}"
          upload_secret "POSTHOG_API_HOST"   "${{ secrets.POSTHOG_API_HOST }}"

# ── 2. Deploy to HF Space ────────────────────────────────────────────────────
  deploy:
    needs: sync-secrets
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF Space
        env:
          HF_TOKEN:      ${{ secrets.HF_TOKEN }}
          HF_USERNAME:   ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          git remote add hf https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME
          git push hf main --force

# ── 3. Wait for Space to accept traffic ─────────────────────────────────────
  await-space:
    needs: deploy
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Poll health until 200 (10-minute budget)
        env:
          HF_USERNAME:   ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          SLUG=$(echo "$HF_SPACE_NAME" | tr '[:upper:]' '[:lower:]')
          SPACE_URL="https://${HF_USERNAME}-${SLUG}.hf.space"
          echo "Waiting for $SPACE_URL to come online..."
          for i in $(seq 1 40); do
            STATUS=$(curl -sf --max-time 20 "$SPACE_URL/api/health" \
              -o /dev/null -w "%{http_code}" || echo "000")
            echo "Attempt $i/40 — HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "Space is live." && exit 0
            sleep 15
          done
          echo "ERROR: Space did not respond within 10 minutes." && exit 1

# ── 4. Seed XBRL data from SEC EDGAR ────────────────────────────────────────
  seed-data:
    needs: await-space
    # Manual only: routine pushes rely on the dataset restore; trigger this from
    # the Actions tab (workflow_dispatch) to rebuild the corpus from EDGAR.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger incremental XBRL refresh (skips existing tickers)
        env:
          HF_USERNAME:   ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: |
          SLUG=$(echo "$HF_SPACE_NAME" | tr '[:upper:]' '[:lower:]')
          SPACE_URL="https://${HF_USERNAME}-${SLUG}.hf.space"
          FORCE_PARAM=""
          if [ "${{ github.event.inputs.force-seed }}" = "true" ]; then
            FORCE_PARAM="?force=true"
            echo "FORCE re-seed requested — will re-fetch all 31 tickers"
          fi
          echo "Seeding XBRL facts from SEC EDGAR..."
          for i in $(seq 1 5); do
            RESPONSE=$(curl -sf --max-time 600 -X POST \
              "$SPACE_URL/api/admin/refresh-data${FORCE_PARAM}" \
              -H "X-API-Key: $ADMIN_API_KEY" \
              -H "Content-Type: application/json") && break
            echo "Attempt $i/5 — curl failed (exit $?), retrying in 15s..."
            sleep 15
          done
          if [ -z "$RESPONSE" ]; then
            echo "ERROR: Could not reach admin endpoint after 5 attempts." && exit 1
          fi
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('status') in ('ok', 'partial'), f'Seed failed: {d}'
          processed = d.get('tickers_processed', 0)
          facts     = d.get('facts_loaded', 0)
          skipped   = d.get('skipped_tickers', [])
          if processed == 0 and not skipped:
              print('All tickers already seeded — nothing to fetch.')
          else:
              print(f'Seeded: {processed} tickers, {facts} facts loaded.')
          if skipped:
              print(f'WARNING — skipped {len(skipped)} ticker(s): {skipped}')
          "

# ── 4-b. Verify the restored dataset DB on the live deployment ──────────────
  embed-data:
    needs: await-space
    runs-on: ubuntu-latest
    steps:
      - name: "Verify restored dataset DB (poll /api/stats)"
        env:
          HF_USERNAME:   ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          SLUG=$(echo "$HF_SPACE_NAME" | tr '[:upper:]' '[:lower:]')
          SPACE_URL="https://${HF_USERNAME}-${SLUG}.hf.space"
          # The Space restores the prebuilt Qwen DuckDB from the HF dataset at
          # boot (fetch_db_from_dataset.py); no re-embedding happens in CI. This
          # gate just confirms the NEW container is serving the right DB, not a
          # stale one left over during HF's rebuild swap:
          #   - active model == expected (defeats config drift)
          #   - ALL stored chunk-vector dims == expected (defeats stale 768-dim
          #     rows AND the old container still serving mid-swap)
          #   - coverage >= TARGET companies
          # (Ticker-level summary embeddings aren't part of the curated dataset,
          # so they're intentionally NOT checked here.)
          EXPECTED_MODEL="Qwen/Qwen3-Embedding-0.6B"
          EXPECTED_DIM=1024
          TARGET=12   # curated dataset = 14 companies (semis + SPCX); floor allows slack
          echo "Waiting 30s for the Space to finish initialising..."
          sleep 30
          echo "Polling $SPACE_URL/api/stats — require model=$EXPECTED_MODEL, all stored dims=$EXPECTED_DIM, >=$TARGET companies..."
          for i in $(seq 1 20); do   # 20 * 20s = ~7 min budget
            STATS=$(curl -sS --max-time 30 "$SPACE_URL/api/stats" || echo '{"error": "curl failed"}')
            RESULT=$(echo "$STATS" | EXPECTED_MODEL="$EXPECTED_MODEL" EXPECTED_DIM="$EXPECTED_DIM" TARGET="$TARGET" python3 -c "
          import sys, json, os
          try:
              line = sys.stdin.read().strip()
              if not line:
                  print('status=empty-response'); sys.exit(1)
              d = json.loads(line)
          except Exception as e:
              print(f'status=parse-error: {e}'); sys.exit(1)
          if 'error' in d:
              print(f'status=api-error: {d[\"error\"]}'); sys.exit(0)
          data = d.get('data', {}) or {}
          cfg = d.get('config', {}) or {}
          model = cfg.get('embedding_model')
          cfg_dim = cfg.get('embedding_dim')
          dim_min = data.get('embedding_dim_min')
          dim_max = data.get('embedding_dim_max')
          dim_variants = data.get('embedding_dim_variants') or 0
          ticker_dim_min = data.get('ticker_embedding_dim_min')
          ticker_dim_max = data.get('ticker_embedding_dim_max')
          ticker_dim_variants = data.get('ticker_embedding_dim_variants') or 0
          ticker_vectors = data.get('ticker_embeddings_with_vectors') or 0
          companies = data.get('companies_with_chunks') or 0
          try:
              exp_model = os.environ['EXPECTED_MODEL']
              exp_dim = int(os.environ['EXPECTED_DIM'])
              target = int(os.environ['TARGET'])
          except KeyError as e:
              print(f'status=env-error: missing {e}'); sys.exit(1)
          
          print(f'status=model={model} cfg_dim={cfg_dim} dim_min={dim_min} dim_max={dim_max} dim_variants={dim_variants} ticker_dim_min={ticker_dim_min} ticker_dim_max={ticker_dim_max} ticker_dim_variants={ticker_dim_variants} ticker_vectors={ticker_vectors} companies={companies}')
          
          if (model == exp_model and cfg_dim == exp_dim and dim_min == exp_dim
                  and dim_max == exp_dim and dim_variants == 1
                  and companies >= target):
              print('READY')
          " || true)
            # ^ `|| true`: a transient empty/parse response (Space still warming)
            #   makes the python helper exit 1; without this, bash -e would abort
            #   the whole retry loop on the first poll. The loop's own ~7-min budget
            #   + final `exit 1` still catches a genuinely-unhealthy deployment.
            echo "Attempt $i/20 — $(echo "$RESULT" | grep '^status=' | sed 's/^status=//')"
            if echo "$RESULT" | grep -q '^READY$'; then
              echo "New deployment verified (model + stored dim + coverage)."
              exit 0
            fi
            sleep 20
          done
          echo "ERROR: new deployment not confirmed after ~7 min (model=$EXPECTED_MODEL, all stored dims=$EXPECTED_DIM, >=$TARGET companies)."
          echo "Last stats: $RESULT"
          exit 1

# ── 5. RAG pipeline smoke test — full coverage list (31 tickers) ─────────────
#  Pipeline under test: chunk → BM25+vector hybrid retrieval → rerank → RRF
#  Runs sequentially to avoid hammering the HF Space; collects all failures
#  before exiting so you see the full pass/fail table in one run.
  rag-pipeline:
    # seed-data is intentionally omitted: it's manual-only now, and a skipped
    # job in `needs` would skip this gate too. embed-data verifies the restored
    # dataset DB (model + dims + coverage) before the smoke test runs.
    needs: [await-space, embed-data]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "RAG pipeline -- all 31 tickers (chunk -> hybrid BM25+vector -> rerank -> RRF)"
        env:
          HF_USERNAME:    ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME:  ${{ secrets.HF_SPACE_NAME }}
          ADMIN_API_KEY:  ${{ secrets.ADMIN_API_KEY }}
        run: |
          SLUG=$(echo "$HF_SPACE_NAME" | tr '[:upper:]' '[:lower:]')
          export SPACE_URL="https://${HF_USERNAME}-${SLUG}.hf.space"
          python3 scripts/rag_pipeline_ci.py
