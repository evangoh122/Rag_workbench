name: Deploy → Seed → RAG Pipeline Validation

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/20 * * * *'   # keepalive ping
    - cron: '0 3 * * *'      # nightly full data refresh
  workflow_dispatch: {}

# ── 1. Sync secrets ─────────────────────────────────────────────────────────
jobs:
  sync-secrets:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Sync API keys to HuggingFace Space secrets
        env:
          HF_TOKEN:       ${{ secrets.HF_TOKEN }}
          HF_USERNAME:    ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME:  ${{ secrets.HF_SPACE_NAME }}
        run: |
          upload_secret() {
            local key=$1 value=$2
            if [ -n "$value" ]; then
              echo "Uploading secret: $key"
              curl -sf -X POST \
                "https://huggingface.co/api/spaces/$HF_USERNAME/$HF_SPACE_NAME/secrets" \
                -H "Authorization: Bearer $HF_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"key\": \"$key\", \"value\": \"$value\"}" \
                -o /dev/null -w "  -> HTTP %{http_code}\n" || echo "  -> FAILED"
            else
              echo "Skipping $key (not set)"
            fi
          }
          upload_secret "GEMINI_API_KEY"    "${{ secrets.GEMINI_API_KEY }}"
          upload_secret "GOOGLE_API_KEY"    "${{ secrets.GOOGLE_API_KEY }}"
          upload_secret "DEEPSEEK_API_KEY"  "${{ secrets.DEEPSEEK_API_KEY }}"
          upload_secret "XIAOMI_API_KEY"    "${{ secrets.XIAOMI_API_KEY }}"
          upload_secret "OPENAI_API_KEY"    "${{ secrets.OPENAI_API_KEY }}"
          upload_secret "ANTHROPIC_API_KEY" "${{ secrets.ANTHROPIC_API_KEY }}"
          upload_secret "REVIEW_API_KEY"    "${{ secrets.REVIEW_API_KEY }}"
          upload_secret "LANGSMITH_API_KEY" "${{ secrets.LANGSMITH_API_KEY }}"
          upload_secret "ADMIN_API_KEY"     "${{ secrets.ADMIN_API_KEY }}"
          upload_secret "EDGAR_USER_AGENT"  "${{ secrets.EDGAR_USER_AGENT }}"
          upload_secret "EMBEDDING_PROVIDER" "huggingface"
          upload_secret "HF_EMBEDDING_MODEL" "Qwen/Qwen3-Embedding-8B"
          upload_secret "HF_EMBED_PROVIDER"  "scaleway"

# ── 2. Deploy to HF Space ────────────────────────────────────────────────────
  deploy:
    needs: sync-secrets
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      space_url: ${{ steps.url.outputs.url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Build Space URL
        id: url
        env:
          HF_USERNAME:   ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          SLUG=$(echo "$HF_SPACE_NAME" | tr '[:upper:]' '[:lower:]')
          echo "url=https://${HF_USERNAME}-${SLUG}.hf.space" >> "$GITHUB_OUTPUT"

      - name: Push to HF Space
        env:
          HF_TOKEN:      ${{ secrets.HF_TOKEN }}
          HF_USERNAME:   ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          git remote add hf https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME
          git push hf main --force

# ── 3. Wait for Space to accept traffic ─────────────────────────────────────
  await-space:
    needs: deploy
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      space_url: ${{ needs.deploy.outputs.space_url }}
    steps:
      - name: Poll health until 200 (5-minute budget)
        env:
          SPACE_URL: ${{ needs.deploy.outputs.space_url }}
        run: |
          echo "Waiting for $SPACE_URL to come online..."
          for i in $(seq 1 20); do
            STATUS=$(curl -sf --max-time 20 "$SPACE_URL/api/health" \
              -o /dev/null -w "%{http_code}" || echo "000")
            echo "Attempt $i/20 — HTTP $STATUS"
            [ "$STATUS" = "200" ] && echo "Space is live." && exit 0
            sleep 15
          done
          echo "ERROR: Space did not respond within 5 minutes." && exit 1

# ── 4. Seed XBRL data from SEC EDGAR ────────────────────────────────────────
  seed-data:
    needs: await-space
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger incremental XBRL refresh (skips existing tickers)
        env:
          SPACE_URL:     ${{ needs.await-space.outputs.space_url }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: |
          echo "Seeding XBRL facts from SEC EDGAR..."
          RESPONSE=$(curl -sf --max-time 600 -X POST \
            "$SPACE_URL/api/admin/refresh-data" \
            -H "X-API-Key: $ADMIN_API_KEY" \
            -H "Content-Type: application/json")
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('status') in ('ok', 'partial'), f'Seed failed: {d}'
          processed = d.get('tickers_processed', 0)
          facts     = d.get('facts_loaded', 0)
          skipped   = d.get('skipped_tickers', [])
          if processed == 0 and not skipped:
              print('All tickers already seeded — nothing to fetch.')
          else:
              print(f'Seeded: {processed} tickers, {facts} facts loaded.')
          if skipped:
              print(f'WARNING — skipped {len(skipped)} ticker(s): {skipped}')
          "

# ── 5. RAG pipeline smoke test ───────────────────────────────────────────────
#  Pipeline under test: chunk → BM25+vector hybrid retrieval → rerank → RRF
  rag-pipeline:
    needs: [await-space, seed-data]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ticker: NVDA
            query: "What was NVIDIA's total revenue and gross margin in their most recent 10-K?"
          - ticker: MU
            query: "What is Micron Technology's operating income and R&D expense?"
          - ticker: AMD
            query: "What were AMD's net income and long-term debt figures?"
          - ticker: INTC
            query: "What is Intel's free cash flow and capital expenditure?"
          - ticker: AVGO
            query: "What is Broadcom's revenue breakdown and operating margin?"
    steps:
      - name: "RAG pipeline — ${{ matrix.ticker }}"
        env:
          SPACE_URL: ${{ needs.await-space.outputs.space_url }}
          TICKER:    ${{ matrix.ticker }}
          QUERY:     ${{ matrix.query }}
        run: |
          echo "=== $TICKER — chunk → hybrid BM25+vector → rerank → RRF ==="
          PAYLOAD=$(python3 -c "
          import json, os
          print(json.dumps({'message': os.environ['QUERY'], 'ticker': os.environ['TICKER']}))
          ")

          RESPONSE=$(curl -sf --max-time 120 -X POST \
            "$SPACE_URL/api/chat/auditable-rag" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo '{"error":"request_failed"}')

          echo "$RESPONSE" | python3 -c "
import sys, json, os

raw = sys.stdin.read().strip()
ticker = os.environ.get('TICKER', '?')
try:
    d = json.loads(raw)
except json.JSONDecodeError:
    print(f'FAIL [{ticker}] non-JSON response: {raw[:200]}')
    sys.exit(1)

if 'error' in d and 'answer' not in d:
    print(f'FAIL [{ticker}] pipeline error: {d.get(\"error\") or d.get(\"detail\")}')
    sys.exit(1)

answer     = d.get('answer') or d.get('result') or ''
eval_route = d.get('eval_route', 'UNKNOWN')
confidence = d.get('confidence')
sources    = d.get('sources', [])
pipeline   = d.get('pipeline_status', {})

assert answer,           f'[{ticker}] No answer returned'
assert len(answer) > 20, f'[{ticker}] Answer too short: {answer!r}'

conf_str = f'{confidence:.2%}' if confidence is not None else 'n/a'
print(f'PASS [{ticker}]')
print(f'  eval_route : {eval_route}')
print(f'  confidence : {conf_str}')
print(f'  sources    : {len(sources)} chunk(s) retrieved')
if pipeline:
    stages = [k for k, v in pipeline.items() if v]
    print(f'  pipeline   : {\" -> \".join(stages)}')
print(f'  answer     : {answer[:120]}...')
          "

# ── Keepalive (every 20 min) ─────────────────────────────────────────────────
  keepalive:
    if: github.event.schedule == '*/20 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        env:
          HF_USERNAME:   ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          SLUG=$(echo "$HF_SPACE_NAME" | tr '[:upper:]' '[:lower:]')
          STATUS=$(curl -sf --max-time 30 \
            "https://$HF_USERNAME-$SLUG.hf.space/api/health" \
            -o /dev/null -w "%{http_code}" || echo "000")
          echo "Health: HTTP $STATUS"
          [ "$STATUS" = "200" ] && echo "Space alive" || echo "Space cold/waking"

# ── Nightly data refresh (3 AM UTC) ─────────────────────────────────────────
  nightly-refresh:
    if: github.event.schedule == '0 3 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Incremental XBRL refresh
        env:
          HF_USERNAME:   ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
          ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
        run: |
          SLUG=$(echo "$HF_SPACE_NAME" | tr '[:upper:]' '[:lower:]')
          BASE="https://$HF_USERNAME-$SLUG.hf.space"
          echo "Waking space..."
          for i in $(seq 1 10); do
            STATUS=$(curl -sf --max-time 30 "$BASE/api/health" \
              -o /dev/null -w "%{http_code}" || echo "000")
            [ "$STATUS" = "200" ] && echo "Awake." && break
            echo "Attempt $i: $STATUS — retrying in 15s..."
            sleep 15
          done
          RESPONSE=$(curl -sf --max-time 600 -X POST \
            "$BASE/api/admin/refresh-data" \
            -H "X-API-Key: $ADMIN_API_KEY" \
            -H "Content-Type: application/json")
          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['status'] in ('ok', 'partial'), f'Refresh failed: {d}'
          skipped = d.get('skipped_tickers', [])
          print(f'Refresh: {d[\"tickers_processed\"]} tickers, {d[\"facts_loaded\"]} facts')
          if skipped: print(f'Skipped: {skipped}')
          "
