name: Refresh Filings (scheduled) → Dataset

# Ongoing freshness: on a weekly schedule (and on demand) pick up any newly-filed
# 10-K / 20-F / 10-Q that isn't in the corpus yet, embed it with the same
# Qwen/Qwen3-Embedding-0.6B (1024-dim) model, and publish — entirely on GitHub's
# runner. embed_additional.py only fetches each company's latest annuals (2) and
# latest quarterlies (3) and skips accessions already stored, so a scheduled run
# is a cheap no-op until a new filing appears, then ingests just that filing.
#
# SAFETY: identical guardrail to embed-annuals.yml (scripts/etl_guardrail.py) —
# the dataset is overwritten only if the DB stays valid (uniform 1024-dim, no
# nulls, no row/ticker shrink, no previously-present filing dropped) AND grew.

on:
  schedule:
    - cron: '0 7 * * 1'   # Mondays 07:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (list what would be embedded; no embed/upload/restart)'
        type: boolean
        default: false

concurrency:
  # Share the embed-dataset lock so this never writes the dataset at the same
  # time as a manual embed-annuals run.
  group: embed-dataset
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      DATASET_REPO: ${{ secrets.HF_USERNAME }}/Rag-workbench
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      HF_USERNAME: ${{ secrets.HF_USERNAME }}
      HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
      EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
      EMBEDDING_PROVIDER: sentence-transformers
      ST_EMBEDDING_MODEL: Qwen/Qwen3-Embedding-0.6B
      EMBEDDING_DIM: '1024'
      # Real run unless explicitly dispatched as a dry run.
      DRY: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download current DB from the HF dataset
        run: |
          python - <<'PY'
          import os, shutil
          from huggingface_hub import hf_hub_download
          os.makedirs("data", exist_ok=True)
          path = hf_hub_download(
              repo_id=os.environ["DATASET_REPO"],
              filename="rag.duckdb",
              repo_type="dataset",
              token=os.environ["HF_TOKEN"],
          )
          shutil.copy(path, "data/rag.duckdb")
          print(f"Downloaded rag.duckdb -> {os.path.getsize('data/rag.duckdb')/1e6:.1f} MB")
          PY

      - name: Snapshot corpus BEFORE embedding
        run: python scripts/etl_guardrail.py snapshot data/rag.duckdb /tmp/before.json

      - name: Embed new annual + quarterly filings
        run: |
          FLAGS=""
          if [ "$DRY" = "true" ]; then FLAGS="--dry-run"; fi
          # Annual (latest 2 x 10-K/20-F) then quarterly (latest 3 x 10-Q = ~1yr).
          python scripts/embed_additional.py --forms annual $FLAGS
          python scripts/embed_additional.py --forms 10-Q --quarters 3 $FLAGS

      - name: 'Guardrail: block any destructive change to the vector DB'
        if: ${{ env.DRY != 'true' }}
        id: guard
        run: python scripts/etl_guardrail.py verify data/rag.duckdb /tmp/before.json

      - name: Log current dataset commit (rollback target)
        if: ${{ env.DRY != 'true' && steps.guard.outputs.changed == 'true' }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          info = api.repo_info(os.environ["DATASET_REPO"], repo_type="dataset")
          print(f"::notice::Pre-upload dataset commit (revert here to roll back): {info.sha}")
          PY

      - name: Upload updated DB to the HF dataset
        if: ${{ env.DRY != 'true' && steps.guard.outputs.changed == 'true' }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_file(
              path_or_fileobj="data/rag.duckdb",
              path_in_repo="rag.duckdb",
              repo_id=os.environ["DATASET_REPO"],
              repo_type="dataset",
              commit_message="ETL(refresh): new filings (${{ steps.guard.outputs.summary }})",
          )
          print("Uploaded: ${{ steps.guard.outputs.summary }}")
          PY

      - name: No-op notice (corpus already current)
        if: ${{ env.DRY != 'true' && steps.guard.outputs.changed != 'true' }}
        run: echo "No new filings since last run; corpus current — skipping upload + restart."

      - name: Restart the Space to serve the new corpus
        if: ${{ env.DRY != 'true' && steps.guard.outputs.changed == 'true' }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo = f"{os.environ['HF_USERNAME']}/{os.environ['HF_SPACE_NAME']}"
          api.restart_space(repo)
          print(f"Restarted Space {repo}; it will fetch the new DB at boot.")
          PY

      - name: 'Post-restart health check: live Space serves a valid 1024-dim corpus'
        if: ${{ env.DRY != 'true' && steps.guard.outputs.changed == 'true' }}
        run: |
          python - <<'PY'
          import os, time, json, urllib.request
          slug = os.environ["HF_SPACE_NAME"].lower()
          url = f"https://{os.environ['HF_USERNAME']}-{slug}.hf.space/api/stats"
          deadline = time.time() + 9 * 60
          last = None
          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(url, timeout=20) as r:
                      d = json.load(r)
                  data = d.get("data", {}) or {}
                  cfg = d.get("config", {}) or {}
                  dmin, dmax = data.get("embedding_dim_min"), data.get("embedding_dim_max")
                  variants = data.get("embedding_dim_variants")
                  companies = data.get("companies_with_chunks") or 0
                  last = f"model={cfg.get('embedding_model')} dim=[{dmin},{dmax}] variants={variants} companies={companies}"
                  if (cfg.get("embedding_model") == "Qwen/Qwen3-Embedding-0.6B"
                          and dmin == 1024 and dmax == 1024 and variants == 1 and companies >= 12):
                      print(f"::notice::Live Space healthy on new corpus — {last}")
                      raise SystemExit(0)
              except SystemExit:
                  raise
              except Exception as e:
                  last = f"warming: {e}"
              print(f"waiting… {last}")
              time.sleep(20)
          print(f"::error::Space did not confirm a healthy 1024-dim corpus in time. Last: {last}")
          raise SystemExit(1)
          PY
