name: Daily Data Refresh
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Call admin refresh endpoint
        run: |
          curl -s -X POST "${{ secrets.API_BASE_URL }}/api/admin/refresh-data" \
            -H "X-API-Key: ${{ secrets.ADMIN_API_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 600
